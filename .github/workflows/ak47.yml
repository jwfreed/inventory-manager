name: Nightly System Integrity

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    container:
      image: node:22
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd="pg_isready -U postgres -d inventory_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CI: 'true'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ci_dummy_secret
      PGPASSWORD: postgres
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000
      TEST_BASE_URL: http://127.0.0.1:3000
      NODE_ENV: test
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: ci-admin-password
      INVENTORY_TX_MAX_ATTEMPTS: '5'
      ENABLE_SCHEDULER: 'false'
      WAREHOUSE_DEFAULTS_REPAIR: 'true'
    steps:
      # ── Phase 1: Infrastructure ─────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client

      - name: Install deps
        run: npm ci

      - name: Wait for Postgres readiness
        run: |
          echo "::group::Postgres readiness"
          for i in {1..90}; do
            if pg_isready -h postgres -p 5432 -U postgres -d inventory_test >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              echo "::endgroup::"
              exit 0
            fi
            sleep 1
          done
          echo "::endgroup::"
          echo "::error::Postgres failed to become ready within 90s"
          exit 1

      # ── Phase 2: Schema ─────────────────────────────────
      - name: Run migrations
        run: npm run migrate:up

      # ── Phase 3: Security ───────────────────────────────
      - name: Create app_ci role and grants
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_ci') THEN
              CREATE ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            ELSE
              ALTER ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            END IF;
          END
          $$;
          GRANT CONNECT ON DATABASE inventory_test TO app_ci;
          GRANT USAGE ON SCHEMA public TO app_ci;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_ci;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_ci;
          REVOKE TRIGGER, TRUNCATE, DELETE ON inventory_movements, inventory_movement_lines FROM app_ci;
          SQL

      # ── Phase 4: Server startup (deterministic) ─────────
      - name: Start API server
        run: |
          set -euo pipefail
          echo "::group::Server startup"
          # Invoke node directly — no npm wrapper, no PID hierarchy ambiguity.
          nohup node \
            -r ts-node/register/transpile-only \
            -r tsconfig-paths/register \
            -r dotenv/config \
            src/server.ts --repair-defaults \
            > server.log 2>&1 &
          SERVER_PID=$!
          echo "$SERVER_PID" > server.pid
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          echo "Server PID: $SERVER_PID"
          echo "::endgroup::"

      - name: Wait for API readiness
        run: |
          set -euo pipefail
          echo "::group::API readiness"
          SERVER_PID="$(cat server.pid)"
          STARTED_AT=$(date +%s)
          for i in {1..90}; do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::endgroup::"
              echo "::error::API process (PID $SERVER_PID) exited before becoming ready"
              echo "--- server.log (last 100 lines) ---"
              tail -100 server.log || true
              exit 1
            fi
            if curl -fsS --max-time 2 "http://127.0.0.1:3000/healthz" >/dev/null 2>&1; then
              ELAPSED=$(( $(date +%s) - STARTED_AT ))
              echo "API ready after ${ELAPSED}s (PID $SERVER_PID)"
              echo "::endgroup::"
              exit 0
            fi
            sleep 1
          done
          echo "::endgroup::"
          echo "::error::API failed to become ready within 90s"
          echo "--- server.log (last 100 lines) ---"
          tail -100 server.log || true
          exit 1

      # ── Phase 5: Scenario tests ─────────────────────────
      - name: Run scenarios suite
        run: npm run test:scenarios

      # ── Phase 6: Post-scenario integrity validation ─────
      - name: Validate inventory invariants
        if: success() || failure()
        run: |
          echo "::group::Inventory invariant validation"
          node scripts/ci-post-scenario-integrity.mjs
          RESULT=$?
          echo "::endgroup::"
          if [ "$RESULT" -eq 2 ]; then
            echo "::error::Inventory invariant violations detected after scenario execution"
            exit 1
          elif [ "$RESULT" -ne 0 ]; then
            echo "::error::Integrity check script error (exit $RESULT)"
            exit 1
          fi

      # ── Phase 7: Cleanup & artifacts ────────────────────
      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            SERVER_PID="$(cat server.pid)"
            echo "Stopping server PID $SERVER_PID"
            kill "$SERVER_PID" 2>/dev/null || true
            # Wait for graceful shutdown (up to 5s)
            for i in {1..10}; do
              if ! kill -0 "$SERVER_PID" 2>/dev/null; then
                echo "Server stopped gracefully"
                break
              fi
              sleep 0.5
            done
            # Force kill if still running
            if kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Force killing server"
              kill -9 "$SERVER_PID" 2>/dev/null || true
            fi
          fi

      - name: Capture server log summary
        if: always()
        run: |
          echo "::group::Server log (last 200 lines)"
          tail -200 server.log 2>/dev/null || echo "(no server.log)"
          echo "::endgroup::"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-scenarios-artifacts
          path: |
            server.log
          retention-days: 14
