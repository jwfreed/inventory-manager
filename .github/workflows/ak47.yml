name: Nightly Scenarios

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  scenarios:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: node:22
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd="pg_isready -U postgres -d inventory_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      CI: 'true'
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
      TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ci_dummy_secret
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000
      TEST_BASE_URL: http://127.0.0.1:3000
      NODE_ENV: test
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client
      - name: Install deps
        run: npm ci
      - name: Wait for Postgres readiness
        run: |
          for i in {1..60}; do
            if pg_isready -h postgres -p 5432 -U postgres -d inventory_test >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"
          exit 1
      - name: Run migrations
        run: npm run migrate:up
      - name: Run scenario suite
        run: npm run test:scenarios
