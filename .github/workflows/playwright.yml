name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Playwright scope
        required: false
        default: all
        type: choice
        options:
          - all
          - smoke

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_e2e
        options: >-
          --health-cmd="pg_isready -U postgres -d inventory_e2e"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CI: 'true'
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/inventory_e2e
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_playwright_secret
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_API_BASE_URL: http://127.0.0.1:3000
      CORS_ORIGIN: http://127.0.0.1:4173
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: ci-admin-password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Wait for Postgres readiness
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d inventory_e2e >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"
          exit 1

      - name: Run migrations
        run: npm run migrate:up

      - name: Start API server
        run: |
          set -euo pipefail
          nohup npm run dev -- --repair-defaults > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API readiness
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:3000/healthz" >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "API process exited early"
              tail -200 server.log || true
              exit 1
            fi
            sleep 1
          done
          echo "API readiness failed"
          tail -200 server.log || true
          exit 1

      - name: Ensure E2E admin user exists
        run: |
          set -euo pipefail
          status="$(curl -sS -o /tmp/bootstrap-e2e.json -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d "{\"adminEmail\":\"$SEED_ADMIN_EMAIL\",\"adminPassword\":\"$SEED_ADMIN_PASSWORD\",\"tenantSlug\":\"default\",\"tenantName\":\"Default Tenant\"}" \
            "http://127.0.0.1:3000/auth/bootstrap")"
          if [[ "$status" != "201" && "$status" != "409" ]]; then
            echo "auth/bootstrap failed with status $status"
            cat /tmp/bootstrap-e2e.json || true
            exit 1
          fi

      - name: Build UI
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3000
        run: npm --prefix ui run build

      - name: Start UI preview
        run: |
          set -euo pipefail
          nohup npm --prefix ui run preview -- --host 127.0.0.1 --port 4173 --strictPort > ui.log 2>&1 &
          echo $! > ui.pid

      - name: Wait for UI readiness
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:4173/login" >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat ui.pid)" 2>/dev/null; then
              echo "UI preview exited early"
              tail -200 ui.log || true
              exit 1
            fi
            sleep 1
          done
          echo "UI readiness failed"
          tail -200 ui.log || true
          exit 1

      - name: Run Playwright tests
        env:
          E2E_SCOPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scope || 'all' }}
        run: |
          set -euo pipefail
          if [[ "$E2E_SCOPE" == "smoke" ]]; then
            npx playwright test --grep @smoke
          else
            npx playwright test
          fi

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            server.log
            ui.log

      - name: Stop servers
        if: always()
        run: |
          set -euo pipefail
          if [[ -f ui.pid ]]; then
            kill "$(cat ui.pid)" || true
          fi
          if [[ -f server.pid ]]; then
            kill "$(cat server.pid)" || true
          fi
