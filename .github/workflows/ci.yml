name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:22
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd="pg_isready -U postgres -d inventory_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      CI: 'true'
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ci_dummy_secret
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000
      TEST_BASE_URL: http://127.0.0.1:3000
      NODE_ENV: test
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: npm run migrate:up
      - name: Seed admin (if present)
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: npm run seed:admin --if-present
      - name: Create app_ci role and grants
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_ci') THEN
              CREATE ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            ELSE
              ALTER ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            END IF;
          END
          $$;
          GRANT CONNECT ON DATABASE inventory_test TO app_ci;
          GRANT USAGE ON SCHEMA public TO app_ci;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_ci;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_ci;
          REVOKE TRIGGER, TRUNCATE, DELETE ON inventory_movements, inventory_movement_lines FROM app_ci;
          SQL
      - name: Start API server (if needed)
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          if command -v nc >/dev/null 2>&1; then
            if nc -z 127.0.0.1 3000 2>/dev/null; then
              echo "API already listening on 127.0.0.1:3000; skipping startup."
              exit 0
            fi
          elif (echo > /dev/tcp/127.0.0.1/3000) >/dev/null 2>&1; then
            echo "API already listening on 127.0.0.1:3000; skipping startup."
            exit 0
          fi
          nohup npm run dev > server.log 2>&1 &
          echo $! > server.pid
      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become ready"
          tail -200 server.log || true
          exit 1
      - name: Run full test suite as postgres
        id: full_suite
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
          TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: node --test --test-reporter=spec --test-timeout=900000 --test-concurrency=1 --import ./tests/setup.mjs tests/api/*.test.mjs tests/ops/*.test.mjs tests/db/*.test.mjs
      - name: DB invariant diagnostics (on full-suite failure)
        if: failure() && steps.full_suite.outcome == 'failure'
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          tests=(
            tests/db/inventory-invariants-scope-hardening.test.mjs
            tests/db/inventory-invariants.test.mjs
            tests/db/phase6-invariants-reservation-warehouse-historical-mismatch.test.mjs
            tests/db/phase6-invariants-warehouse-id-drift.test.mjs
            tests/ops/clean-dev-db-no-drift.test.mjs
          )
          for t in "${tests[@]}"; do
            echo "==== pg_stat_activity before ${t} ===="
            psql "$DATABASE_URL" -c "select now(), pid, state, wait_event_type, wait_event, query from pg_stat_activity where datname=current_database() order by state, pid;"
            echo "==== rerun ${t} ===="
            node --test --test-reporter=spec --test-timeout=900000 --test-concurrency=1 --import ./tests/setup.mjs "$t" || true
            echo "==== pg_stat_activity after ${t} ===="
            psql "$DATABASE_URL" -c "select now(), pid, state, wait_event_type, wait_event, query from pg_stat_activity where datname=current_database() order by state, pid;"
          done
      - name: Run financial core guards as postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
          TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          npm run test:financial-core
      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          tail -200 server.log || true
