name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: node:22
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd="pg_isready -U postgres -d inventory_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      CI: 'true'
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ci_dummy_secret
      PGPASSWORD: postgres
      PORT: 3000
      API_BASE_URL: http://127.0.0.1:3000
      TEST_BASE_URL: http://127.0.0.1:3000
      NODE_ENV: test
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: ci-admin-password
      INVARIANTS_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test_invariants
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client
      - name: Install deps
        run: npm ci
      - name: Wait for Postgres readiness
        run: |
          for i in {1..60}; do
            if pg_isready -h postgres -p 5432 -U postgres -d inventory_test >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"
          exit 1
      - name: Build
        run: npm run build --if-present
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: npm run migrate:up
      - name: Seed admin (if present)
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: npm run seed:admin --if-present
      - name: Create app_ci role and grants
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_ci') THEN
              CREATE ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            ELSE
              ALTER ROLE app_ci WITH LOGIN PASSWORD 'app_ci_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            END IF;
          END
          $$;
          GRANT CONNECT ON DATABASE inventory_test TO app_ci;
          GRANT USAGE ON SCHEMA public TO app_ci;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_ci;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_ci;
          REVOKE TRIGGER, TRUNCATE, DELETE ON inventory_movements, inventory_movement_lines FROM app_ci;
          SQL
      - name: Start API server (if needed)
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          set -euo pipefail
          if command -v nc >/dev/null 2>&1; then
            if nc -z 127.0.0.1 3000 2>/dev/null; then
              echo "API already listening on 127.0.0.1:3000; skipping startup."
              exit 0
            fi
          elif (echo > /dev/tcp/127.0.0.1/3000) >/dev/null 2>&1; then
            echo "API already listening on 127.0.0.1:3000; skipping startup."
            exit 0
          fi
          nohup npm run dev -- --repair-defaults > server.log 2>&1 &
          SERVER_PID=$!
          echo "$SERVER_PID" > server.pid
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          sleep 1
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "API process exited immediately after startup"
            cat server.log || true
            ps -p "$SERVER_PID" -o pid,ppid,stat,etime,cmd || true
            exit 1
          fi
      - name: Wait for API readiness
        run: |
          set -euo pipefail
          SERVER_PID=""
          if [ -f server.pid ]; then
            SERVER_PID="$(cat server.pid)"
          fi
          for i in {1..60}; do
            if [ -n "$SERVER_PID" ] && ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "API process exited before readiness"
              cat server.log || true
              ps -p "$SERVER_PID" -o pid,ppid,stat,etime,cmd || true
              exit 1
            fi
            if curl -fsS "http://127.0.0.1:3000/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become ready"
          cat server.log || true
          if [ -n "$SERVER_PID" ]; then
            ps -p "$SERVER_PID" -o pid,ppid,stat,etime,cmd || true
          fi
          exit 1
      - name: Run main test suite (excluding invariant gate files)
        id: main_suite
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
          TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          set -euo pipefail
          excluded=(
            tests/db/inventory-invariants-scope-hardening.test.mjs
            tests/db/inventory-invariants.test.mjs
            tests/db/phase6-invariants-reservation-warehouse-historical-mismatch.test.mjs
            tests/db/phase6-invariants-warehouse-id-drift.test.mjs
            tests/ops/clean-dev-db-no-drift.test.mjs
          )
          tests=()
          while IFS= read -r file; do
            skip=false
            for ex in "${excluded[@]}"; do
              if [[ "$file" == "$ex" ]]; then
                skip=true
                break
              fi
            done
            if [[ "$skip" == false ]]; then
              tests+=("$file")
            fi
          done < <(find tests/api tests/ops tests/db -maxdepth 1 -type f -name '*.test.mjs' | sort)
          echo "Running ${#tests[@]} tests in main suite"
          node --test --test-reporter=spec --test-timeout=900000 --test-concurrency=4 --import ./tests/setup.mjs "${tests[@]}"
      - name: Prepare isolated DB for invariant gate files
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          set -euo pipefail
          psql "postgres://postgres:postgres@postgres:5432/postgres" -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS inventory_test_invariants;"
          psql "postgres://postgres:postgres@postgres:5432/postgres" -v ON_ERROR_STOP=1 -c "CREATE DATABASE inventory_test_invariants;"
          psql "postgres://postgres:postgres@postgres:5432/postgres" -v ON_ERROR_STOP=1 -c "GRANT CONNECT ON DATABASE inventory_test_invariants TO app_ci;"
          DATABASE_URL="$INVARIANTS_DATABASE_URL" npm run migrate:up
          DATABASE_URL="$INVARIANTS_DATABASE_URL" npm run seed:admin --if-present
          psql "$INVARIANTS_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT USAGE ON SCHEMA public TO app_ci;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_ci;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_ci;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO app_ci;
          REVOKE TRIGGER, TRUNCATE, DELETE ON inventory_movements, inventory_movement_lines FROM app_ci;
          SQL
      - name: Run invariant gate files serially with bounded budgets
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test_invariants
          TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test_invariants
          INVARIANTS_MAX_ATTEMPTS_PER_TENANT: '2'
          INVARIANTS_MAX_TENANT_WALL_CLOCK_MS: '90000'
          INVARIANTS_STATEMENT_TIMEOUT_MS: '15000'
          INVARIANTS_LOCK_TIMEOUT_MS: '3000'
          INVARIANTS_QUERY_TIMEOUT_MS: '20000'
        run: |
          set -euo pipefail
          tests=(
            tests/db/inventory-invariants-scope-hardening.test.mjs
            tests/db/inventory-invariants.test.mjs
            tests/db/phase6-invariants-reservation-warehouse-historical-mismatch.test.mjs
            tests/db/phase6-invariants-warehouse-id-drift.test.mjs
            tests/ops/clean-dev-db-no-drift.test.mjs
          )
          for t in "${tests[@]}"; do
            echo "==== pg_stat_activity before ${t} ===="
            psql "$DATABASE_URL" -c "select now(), pid, state, wait_event_type, wait_event, query from pg_stat_activity where datname=current_database() order by state, pid;"
            echo "==== run ${t} ===="
            node --test --test-reporter=spec --test-timeout=900000 --test-concurrency=1 --import ./tests/setup.mjs "$t"
            echo "==== pg_stat_activity after ${t} ===="
            psql "$DATABASE_URL" -c "select now(), pid, state, wait_event_type, wait_event, query from pg_stat_activity where datname=current_database() order by state, pid;"
          done
      - name: Run financial core guards as postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
          TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/inventory_test
        run: |
          npm run test:financial-core
      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          tail -200 server.log || true
